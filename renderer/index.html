<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Enhance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="titlebar">
  <span class="titlebar-text">Prompt Enhance</span>
  <div>
    <button class="tb-btn" id="btnMinimize">_</button>
    <button class="tb-btn tb-close" id="btnClose">x</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="settings">Settings</button>
  <button class="tab" data-tab="history">History</button>
</div>

<div class="scroll-area">

<!-- SETTINGS -->
<div id="panel-settings" class="panel active">

  <div class="group">
    <div class="group-title">Shortcuts</div>
    <div class="shortcut-bar">
      <div><span class="lbl">Enhance</span><span class="key" id="shortcutDisplay">Ctrl+Shift+Q</span></div>
      <div><span class="lbl">Undo</span><span class="key" id="undoShortcutDisplay">Ctrl+Alt+Z</span></div>
    </div>
    <div class="note">Select any text and press the Enhance shortcut. Press Undo to restore the original.</div>
  </div>

  <div class="group">
    <div class="group-title">AI Provider</div>
    <div class="field">
      <label>Provider</label>
      <select id="providerSelect"></select>
    </div>
    <div class="field">
      <label>Model</label>
      <select id="modelSelect"></select>
    </div>
    <div class="field">
      <label>API Key</label>
      <div class="row">
        <input type="password" id="apiKeyInput" placeholder="Paste your API key here...">
        <button class="sm-btn" id="btnToggleKey">Show</button>
      </div>
      <div class="status-bar" id="statusBar">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">No API key set</span>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="group-title">Enhancement Style</div>
    <div class="field">
      <label>Style</label>
      <select id="styleSelect"></select>
    </div>
    <div class="field" id="customSection" style="display:none;">
      <label>Custom Prompt</label>
      <textarea id="customPrompt" rows="3" placeholder="Write your custom prompt here..."></textarea>
    </div>
  </div>

  <div class="group">
    <div class="group-title">Options</div>
    <div class="field">
      <label class="ck"><input type="checkbox" id="autoStartCheck"> Launch at Windows startup</label>
    </div>
  </div>

  <div class="group" style="border:none; padding-bottom:0;">
    <button class="btn" id="btnSave">Save Settings</button>
    <span class="sv" id="saveStatus"></span>
  </div>
</div>

<!-- HISTORY -->
<div id="panel-history" class="panel">
  <div class="group">
    <div class="group-title">Enhancement History</div>
    <div class="row" style="margin-bottom:10px;">
      <input type="text" id="historySearch" placeholder="Search..." style="flex:1;">
      <button class="sm-btn" id="btnClearHistory">Clear All</button>
    </div>
    <div id="historyBody">
      <div class="empty-state" id="historyEmpty">
        <div class="empty-icon">O</div>
        <p>No history yet</p>
        <span>Your past enhancements will show up here</span>
      </div>
    </div>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>
<script src="renderer.js"></script>
</body>
</html>
